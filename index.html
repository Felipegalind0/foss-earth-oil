<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/foss-earth-oil/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earth Oil Viz — FOSS Earth</title>
    <script type="module" crossorigin src="/foss-earth-oil/assets/index-BI34-w9E.js"></script>
    <link rel="stylesheet" crossorigin href="/foss-earth-oil/assets/index-YJNPgWvF.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- Dataset Selector Panel -->
    <div id="dataPanel" class="data-panel is-minimized">
      <button
        id="dataPanelToggle"
        class="data-panel-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="dataPanelBody"
      >
        Show Data Overlay
      </button>
      <div id="dataPanelBody" class="data-panel-body">
        <label class="data-panel-label" for="datasetSelect">Dataset</label>
        <select id="datasetSelect" class="data-panel-select">
          <option value="all">Crude Oil — All Flows (468)</option>
          <option value="top50">Crude Oil — Top 50 Flows</option>
          <option value="top30">Crude Oil — Top 30 Flows</option>
          <option value="middle_east">Middle East Exports</option>
          <option value="americas">Americas Exports</option>
          <option value="africa">Africa Exports</option>
          <option value="europe">Europe Exports</option>
          <option value="russia_cis">Russia &amp; CIS Exports</option>
        </select>
        <label class="data-panel-label" for="routeScenarioSelect">Routing Scenario</label>
        <select id="routeScenarioSelect" class="data-panel-select">
          <option value="baseline">Baseline</option>
          <option value="suez_closed">Suez Closed</option>
          <option value="panama_constrained">Panama Constrained</option>
          <option value="hormuz_high_risk">Hormuz High Risk</option>
        </select>
        <div class="data-panel-scenario">
          <span class="data-panel-source-heading">Scenario Effect</span>
          <span id="routeScenarioDescription">Normal corridor costs with all major chokepoints open.</span>
        </div>
        <div class="data-panel-source">
          <span class="data-panel-source-heading">Source</span>
          <span id="dataSourceText">Harvard Atlas of Economic Complexity / UN Comtrade — SITC 3330 crude petroleum (2023)</span>
        </div>
      </div>
    </div>

  </body>
</html>
